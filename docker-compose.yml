services:
  db:
    image: postgres:16-alpine
    container_name: goaltracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: goaluser
      POSTGRES_PASSWORD: goalpass
      POSTGRES_DB: goaltracker
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - goaltracker_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goaluser -d goaltracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  goaltracker_data: